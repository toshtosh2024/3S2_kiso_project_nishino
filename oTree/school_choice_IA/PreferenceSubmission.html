{{ block title }}
    希望順位の入力
{{ endblock }}

{{ block content }}
    <p>以下のドロップダウンから、あなたの希望する順位を選択してください。</p>

    <div class="list-group m-3">
        <div class="list-group-item">
            {{ formfield 'rank1' }}
        </div>
        <div class="list-group-item">
            {{ formfield 'rank2' }}
        </div>
        <div class="list-group-item">
            {{ formfield 'rank3' }}
        </div>
        <div class="list-group-item">
            {{ formfield 'rank4' }}
        </div>
    </div>

    <div class="alert alert-warning">
        ※同じ学校を重複して選択しないように注意してください。
    </div>

    {{ next_button }}
{{ endblock }}
